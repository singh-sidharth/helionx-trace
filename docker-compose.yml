version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: helionx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: helionx
      POSTGRES_USER: helionx
      POSTGRES_PASSWORD: helionx
    ports:
      - "5432:5432"
    volumes:
      - helionx_postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/001-init.sql:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U helionx -d helionx"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  helionx_postgres_data:
